{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami | Portfolio</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <nav class="navbar glass">
        <div class="logo"><button class="theme-toggle"onclick="toggleTheme()">🌓</button></div>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'projects' %}">Projects</a></li>
            <li><a href="{% url 'journey' %}">Journey</a></li>
            <li><a href="{% url 'contact' %}">Contact</a></li>
        </ul>
    </nav>

    <main class="content-wrapper">
        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'main/js/script.js' %}"></script>
</body>
    <footer class="main-footer glass">
        <div class="footer-content">
            <div class="footer-logo">SAMI.EXE</div>
            <div class="social-handles">
                <a href="https://github.com/yourusername" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com/in/yourusername" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="https://fiverr.com/yourusername" target="_blank"><span class="fiverr-icon">Fi.</span></a>
                <a href="https://upwork.com/yourusername" target="_blank"><i class="fab fa-upwork"></i></a>
            </div>
            <p class="copyright">© 2026 Sami Khan // System Version 1.0</p>
        </div>
    </footer>
</html>
