{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<div class="min-h-screen bg-[#0a0a0c] pt-32 pb-20 px-6">
    
    <div class="max-w-7xl mx-auto text-center mb-16">
        <h1 class="text-4xl font-bold text-white uppercase tracking-[0.2em] font-['Orbitron']">
            Mission <span class="text-[#ff6600]">Log</span>
        </h1>
        <div class="mt-4 h-1 w-20 bg-[#ff6600] mx-auto"></div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        
        {% for project in projects %}
        <div class="group relative h-[450px] w-full rounded-[30px] overflow-hidden border border-white/10 transition-all duration-500 hover:border-[#ff6600]/50 hover:-translate-y-3 shadow-2xl">
            
            <div class="absolute inset-0 z-0">
                {% if project.image %}
                    <img src="{{ project.image.url }}" 
                         alt="{{ project.title }}" 
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                {% else %}
                    <div class="w-full h-full bg-neutral-900"></div>
                {% endif %}
                
                <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0c] via-[#0a0a0c]/60 to-transparent opacity-80 group-hover:opacity-90 transition-opacity"></div>
            </div>

            <div class="relative z-10 h-full flex flex-col justify-end p-8">
                
                <span class="text-[#ff6600] text-xs font-bold tracking-widest uppercase mb-2 opacity-0 group-hover:opacity-100 transition-all translate-y-4 group-hover:translate-y-0 duration-500">
                    Project Active
                </span>

                <h3 class="text-2xl font-bold text-white font-['Orbitron'] mb-3">
                    {{ project.title }}
                </h3>
                
                <p class="text-gray-300 text-sm leading-relaxed mb-6 line-clamp-3">
                    {{ project.description }}
                </p>

                <div class="flex items-center justify-between pt-4 border-t border-white/10">
                    <a href="{% url 'project_detail' project.pk %}" class="text-white text-xs font-bold uppercase tracking-widest hover:text-[#ff6600] transition-colors">
                        Explore Mission →
                    </a>
                    <div class="h-2 w-2 rounded-full bg-[#ff6600] animate-pulse"></div>
                </div>
            </div>

        </div>
        {% empty %}
        <p class="text-gray-600 font-mono col-span-full text-center">[ ARCHIVE_EMPTY ]</p>
        {% endfor %}

    </div>
</div>
{% endblock %}
